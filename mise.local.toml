[tools]
node = "24"
elm = "0.19.1"
pnpm = "latest"

[tasks.format]
run = "pnpm format"

[tasks.lint]
run = "pnpm lint"

[tasks.compile]
run = "pnpm compile"

[tasks.build]
depends = ["format", "lint", "compile"]

[tasks.doc-test]
run = "pnpm doc-tests"

[tasks.unit-test]
run = "pnpm test"

[tasks.test]
depends = ["doc-test", "unit-test"]

[tasks.dev]
depends = ["build", "test"]

[tasks.serve]
run = "pnpm serve"
