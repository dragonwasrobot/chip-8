[tools]
node = "24"
elm = "0.19.1"

[tasks.format]
run = "npm run format"

[tasks.lint]
run = "npm run lint"

[tasks.compile]
run = "npm run compile"

[tasks.build]
depends = ["format", "lint", "compile"]

[tasks.doc-test]
run = "npm run doc-tests"

[tasks.unit-test]
run = "npm run test"

[tasks.test]
depends = ["doc-test", "unit-test"]

[tasks.dev]
depends = ["build", "test"]

[tasks.serve]
run = "npm run serve"
